services:
  school-ai-assistant:
    build: .
    container_name: school-ai-assistant
    environment:
      DATABASE_URL: sqlite:////data/school_erp.db
      LOG_FILE_PATH: /data/logs/assistant.log
      AUTO_SEED: "true"
      LLM_PROVIDER: ${LLM_PROVIDER:-disabled}
      LLM_TEMPERATURE: ${LLM_TEMPERATURE:-0}
      OLLAMA_BASE_URL: ${OLLAMA_BASE_URL:-http://host.docker.internal:11434}
      OLLAMA_MODEL: ${OLLAMA_MODEL:-llama3.1}
      OLLAMA_TIMEOUT_SECONDS: ${OLLAMA_TIMEOUT_SECONDS:-2}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      OPENAI_MODEL: ${OPENAI_MODEL:-gpt-4o-mini}
      GEMINI_API_KEY: ${GEMINI_API_KEY:-}
      GEMINI_MODEL: ${GEMINI_MODEL:-gemini-2.5-flash}
      APP_TIMEZONE: ${APP_TIMEZONE:-Asia/Calcutta}
    ports:
      - "8000:8000"
    volumes:
      - school_ai_data:/data
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health', timeout=3).read()"]
      interval: 15s
      timeout: 5s
      retries: 5

volumes:
  school_ai_data:
